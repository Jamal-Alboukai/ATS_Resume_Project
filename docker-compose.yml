version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ats_backend
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  celery:
    build: ./backend
    container_name: ats_celery
    command: celery -A app.celery worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      - backend
      - redis

  redis:
    image: redis:6
    container_name: ats_redis
   
